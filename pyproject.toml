[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["apps/demos/.venv"]
cache-dir = ".artifacts/cache/ruff"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
addopts = "-q -p no:cacheprovider"
pythonpath = ["apps/demos"]
testpaths = ["apps/demos/tests"]
